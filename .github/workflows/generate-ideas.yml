name: Generate Ideas Data

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  regenerate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate data.js
        run: node generate.js

      - name: Commit updated data.js
        run: |
          if git diff --quiet -- data.js; then
            echo "No changes to data.js"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js
          git commit -m "chore: regenerate data.js [skip ci]"
          git push
